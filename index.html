<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Central de Conhecimento</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0b1d3a,#1d3557,#2a6f97,#e9c46a);
  min-height:100vh;
  color:white;
}

.header{
  height:220px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:0 60px;
  position:relative;
}

.header::before{
  content:"";
  position:absolute;
  width:700px;
  height:700px;
  background:radial-gradient(circle,rgba(255,183,77,0.25),transparent 70%);
  top:-200px;
  right:-200px;
  filter:blur(100px);
}

.header h1{
  font-family:'Outfit',sans-serif;
  font-size:3rem;
}

.header p{
  margin-top:10px;
  color:rgba(255,255,255,0.85);
}

.intro{
  padding:20px 60px;
  max-width:900px;
  color:rgba(255,255,255,0.85);
}

.main{padding:30px;}

.item{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:30px;
  margin-bottom:20px;
  border-radius:18px;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.08);
  transition:0.4s;
  position:relative;
  overflow:hidden;
}

.item:hover{
  transform:translateY(-6px);
  box-shadow:0 25px 60px rgba(0,0,0,0.3);
}

.item::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:8px;
  height:100%;
}

.info{
  display:flex;
  align-items:center;
  gap:25px;
}

.icone{font-size:28px;}

.texto h2{font-size:1.4rem;}

.texto p{
  font-size:0.95rem;
  color:rgba(255,255,255,0.75);
}

.botoes{
  display:flex;
  gap:10px;
}

.botoes button{
  padding:10px 18px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  font-size:0.8rem;
}

.editar{background:#3b82f6;color:white;}
.acessar{background:#22c55e;color:white;}
.excluir{background:#ef4444;color:white;}

.add{
  width:100%;
  padding:30px;
  margin-bottom:20px;
  border-radius:18px;
  background:rgba(255,255,255,0.15);
  text-align:center;
  font-size:1.2rem;
  cursor:pointer;
}

.footer{
  text-align:center;
  padding:25px;
  color:rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<div class="header">
  <h1>Admin - Central de Conhecimento</h1>
  <p>Gerencie todos os temas da plataforma</p>
</div>

<div class="intro">
  Você pode criar, editar ou excluir qualquer tema.
</div>

<div class="main">

  <div class="add" onclick="criarTema()">+ Adicionar novo tema</div>

  <div id="lista"></div>

</div>

<div class="footer">
  © 2026 — Nicholas Grassotti Spolavori
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAH0xTUWEeMqsxAIFOMTmDdhAdPHb5AkRY",
  authDomain: "nick-curso.firebaseapp.com",
  projectId: "nick-curso",
  storageBucket: "nick-curso.firebasestorage.app",
  messagingSenderId: "774707174312",
  appId: "1:774707174312:web:e9fbf29073ce35bcbe9b9d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* TEMAS PADRÃO */
let padrao=[
  {id:"incoterms",titulo:"Incoterms",descricao:"Regras internacionais de comércio",emoji:"📦",cor:"#e9c46a"},
  {id:"sinistro",titulo:"Regulação de Sinistro",descricao:"Análise de perdas e danos",emoji:"🚚",cor:"#2a9d8f"},
  {id:"risco",titulo:"Análise de Risco",descricao:"Identificação e prevenção",emoji:"⚠️",cor:"#f4a261"},
  {id:"seguro",titulo:"Seguro de Transporte",descricao:"Cobertura de cargas",emoji:"📑",cor:"#8ecae6"},
  {id:"documentos",titulo:"Documentação",descricao:"Controle logístico",emoji:"🧾",cor:"#90be6d"},
  {id:"prevencao",titulo:"Prevenção de Perdas",descricao:"Evitar prejuízos",emoji:"🚨",cor:"#e76f51"}
];

let temas=[];

/* CARREGAR */
db.ref("temas").on("value", snapshot=>{
  let dados = snapshot.val() || {};
  temas = Object.values(dados);
  render();
});

/* RENDER */
function render(){
  lista.innerHTML="";

  [...padrao, ...temas].forEach(t=>{
    lista.innerHTML+=`
      <div class="item" style="border-left:8px solid ${t.cor}">
        <div class="info">
          <div class="icone">${t.emoji}</div>
          <div class="texto">
            <h2>${t.titulo}</h2>
            <p>${t.descricao}</p>
          </div>
        </div>

        <div class="botoes">
          <button class="editar" onclick="editar('${t.id}')">Editar</button>
          <button class="excluir" onclick="excluir('${t.id}')">Excluir</button>
          <button class="acessar" onclick="acessar('${t.id}')">Acessar</button>
        </div>
      </div>
    `;
  });
}

/* AÇÕES */
function criarTema(){
  localStorage.removeItem("editando");
  window.location.href="admin_editor.html";
}

function editar(id){
  localStorage.setItem("editando",id);
  window.location.href="admin_editor.html";
}

function acessar(id){
  localStorage.setItem("editando",id);
  window.location.href="admin_conteudo.html";
}

function excluir(id){
  temas = temas.filter(t=>t.id!=id);

  let novo = {};
  temas.forEach(t=>{
    novo[t.id] = t;
  });

  db.ref("temas").set(novo);
}
</script>

</body>
</html>
