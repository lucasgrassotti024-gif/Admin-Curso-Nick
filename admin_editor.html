<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de Tema</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter', sans-serif;
  background:linear-gradient(135deg,#0b1d3a,#1d3557,#2a6f97,#e9c46a);
  color:white;
}

.header{padding:60px;}

.voltar{
  display:inline-block;
  margin-bottom:20px;
  padding:10px 20px;
  border-radius:30px;
  background:rgba(255,255,255,0.15);
  color:white;
  text-decoration:none;
}

.container{
  display:flex;
  gap:40px;
  padding:40px 60px;
}

.form{
  width:350px;
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  border-radius:20px;
  border:none;
  background:rgba(255,255,255,0.2);
  color:white;
  cursor:pointer;
}

.cores{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-bottom:15px;
}

.cor{
  width:100%;
  height:30px;
  border-radius:6px;
  cursor:pointer;
}

.emoji-box{
  display:none;
  margin-top:10px;
  max-height:120px;
  overflow-y:auto;
}

.emoji-box span{
  font-size:20px;
  cursor:pointer;
  margin:5px;
  display:inline-block;
}

.preview{flex:1;}

.card{
  padding:30px;
  border-radius:18px;
  background:rgba(255,255,255,0.08);
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="header">
  <a href="admin_index.html" class="voltar">← Voltar</a>
  <h1>Editor de Tema</h1>
</div>

<div class="container">

<div class="form">

<input id="titulo" placeholder="Título">
<input id="descricao" placeholder="Descrição">

<input id="emoji" placeholder="Emoji">
<button onclick="abrirEmojis()">Escolher emoji</button>

<div class="emoji-box" id="emojiBox">
  <span onclick="setEmoji('📦')">📦</span>
  <span onclick="setEmoji('🚚')">🚚</span>
  <span onclick="setEmoji('⚠️')">⚠️</span>
  <span onclick="setEmoji('📘')">📘</span>
  <span onclick="setEmoji('🎥')">🎥</span>
  <span onclick="setEmoji('💰')">💰</span>
</div>

<input id="cor" placeholder="Cor">

<div class="cores">
  <div class="cor" style="background:#e9c46a" onclick="setCor('#e9c46a')"></div>
  <div class="cor" style="background:#2a9d8f" onclick="setCor('#2a9d8f')"></div>
  <div class="cor" style="background:#f4a261" onclick="setCor('#f4a261')"></div>
  <div class="cor" style="background:#e76f51" onclick="setCor('#e76f51')"></div>
  <div class="cor" style="background:#8ecae6" onclick="setCor('#8ecae6')"></div>
  <div class="cor" style="background:#90be6d" onclick="setCor('#90be6d')"></div>
</div>

<button onclick="salvar()">Salvar</button>

</div>

<div class="preview">
  <h2>Preview</h2>

  <div class="card" id="card">
    <div>
      <span id="pEmoji">📦</span>
      <div>
        <h3 id="pTitulo">Título</h3>
        <p id="pDesc">Descrição</p>
      </div>
    </div>
  </div>
</div>

</div>

<!-- FIREBASE PRIMEIRO -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAH0xTUWEeMqsxAIFOMTmDdhAdPHb5AkRY",
  authDomain: "nick-curso.firebaseapp.com",
  projectId: "nick-curso",
  storageBucket: "nick-curso.firebasestorage.app",
  messagingSenderId: "774707174312",
  appId: "1:774707174312:web:e9fbf29073ce35bcbe9b9d",
  measurementId: "G-R87PV5NDGW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* VARIÁVEIS */
let temas = [];
let id = localStorage.getItem("editando");
let tema = null;

/* CARREGAR DO FIREBASE */
db.ref("temas").on("value", snapshot=>{
  temas = snapshot.val() || [];

  tema = temas.find(t => t.id == id);

  if(tema){
    titulo.value = tema.titulo || "";
    descricao.value = tema.descricao || "";
    emoji.value = tema.emoji || "";
    cor.value = tema.cor || "";
    atualizar();
  }
});

/* PREVIEW */
function atualizar(){
  pTitulo.innerText = titulo.value;
  pDesc.innerText = descricao.value;
  pEmoji.innerText = emoji.value;
  card.style.borderLeft = "8px solid " + cor.value;
}

document.querySelectorAll("input").forEach(i => i.oninput = atualizar);

/* EMOJI */
function abrirEmojis(){
  emojiBox.style.display = emojiBox.style.display === "block" ? "none" : "block";
}

function setEmoji(e){
  emoji.value = e;
  atualizar();
}

/* COR */
function setCor(c){
  cor.value = c;
  atualizar();
}

/* SALVAR */
function salvar(){

  if(!tema){
    tema = { id: Date.now() };
    temas.push(tema);
  }

  tema.titulo = titulo.value;
  tema.descricao = descricao.value;
  tema.emoji = emoji.value;
  tema.cor = cor.value;

  db.ref("temas").set(temas);

  window.location.href = "admin_index.html";
}

</script>

</body>
</html>
