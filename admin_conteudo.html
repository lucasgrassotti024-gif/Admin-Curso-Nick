<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Conteúdo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#0b1d3a,#1d3557,#2a6f97,#e9c46a);
  color:white;
}

.header{padding:80px 60px 30px;}

.header h1{
  font-family:'Outfit',sans-serif;
  font-size:2.5rem;
}

.voltar{
  display:inline-block;
  margin-bottom:30px;
  padding:10px 22px;
  border-radius:30px;
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.5);
  color:white;
  text-decoration:none;
}

.main{padding:40px 60px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.icon{font-size:40px;margin-bottom:15px;}

.form{margin-top:40px;display:none;}

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px 20px;
  border-radius:20px;
  border:none;
  cursor:pointer;
}

.footer{
  text-align:center;
  padding:30px;
  color:rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<div class="header">
  <a href="#" onclick="voltar(event)" class="voltar">← Voltar</a>
  <h1>Editar Conteúdo</h1>
</div>

<div class="main">

  <div class="grid">
    <div class="card" onclick="abrirForm('apresentacao')">
      <div class="icon">📊</div>
      <h2>Apresentação</h2>
    </div>

    <div class="card" onclick="abrirForm('video')">
      <div class="icon">🎥</div>
      <h2>Videoaula</h2>
    </div>

    <div class="card" onclick="abrirForm('ebook')">
      <div class="icon">📘</div>
      <h2>E-book</h2>
    </div>
  </div>

  <div class="form" id="form">
    <input type="file" id="fileVideo" accept="video/*">
    <input type="file" id="fileImagem" accept="image/*">
    <input type="file" id="filePdf" accept=".pdf">
    <textarea id="texto" placeholder="Texto do e-book"></textarea>
    <button onclick="salvar()">Salvar Conteúdo</button>
  </div>

</div>

<div class="footer">
  © 2026 — Nicholas Grassotti Spolavori
</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- 🔥 CONFIGURAÇÃO (ESSENCIAL) -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAH0xTUWEeMqsxAIFOMTmDdhAdPHb5AkRY",
  authDomain: "nick-curso.firebaseapp.com",
  projectId: "nick-curso",
  storageBucket: "nick-curso.firebasestorage.app",
  messagingSenderId: "774707174312",
  appId: "1:774707174312:web:e9fbf29073ce35bcbe9b9d",
  measurementId: "G-R87PV5NDGW"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<!-- 🔥 SCRIPT PRINCIPAL -->
<script>

/* VARIÁVEIS */
let temas = [];
let tema = null;
const id = localStorage.getItem("editando");

let tipoAtual = "";
let carregado = false;

/* CARREGAR */
db.ref("temas").on("value", snapshot => {
  temas = snapshot.val() || [];
  tema = temas.find(t => t.id == id);
  carregado = true;
});

/* VOLTAR */
function voltar(e){
  e.preventDefault();
  window.location.href = "index.html";
}

/* ABRIR FORM */
function abrirForm(tipo){
  tipoAtual = tipo;
  form.style.display = "block";

  fileVideo.style.display = "none";
  fileImagem.style.display = "none";
  filePdf.style.display = "none";
  texto.style.display = "none";

  if(tipo==="video") fileVideo.style.display="block";
  if(tipo==="apresentacao") fileImagem.style.display="block";
  if(tipo==="ebook"){
    filePdf.style.display="block";
    texto.style.display="block";
  }
}

/* SALVAR */
function salvar(){

  if(!carregado){
    alert("Aguarde o sistema carregar...");
    return;
  }

  if(!tema){
    alert("Erro: tema não encontrado");
    return;
  }

  const videoFile = document.getElementById("fileVideo").files[0];
  const imagemFile = document.getElementById("fileImagem").files[0];
  const pdfFile = document.getElementById("filePdf").files[0];

  const reader = new FileReader();

  if(tipoAtual==="video" && videoFile){
    reader.onload = e=>{
      tema.video = e.target.result;
      salvarFinal();
    };
    reader.readAsDataURL(videoFile);
    return;
  }

  if(tipoAtual==="apresentacao" && imagemFile){
    reader.onload = e=>{
      tema.imagem = e.target.result;
      salvarFinal();
    };
    reader.readAsDataURL(imagemFile);
    return;
  }

  if(tipoAtual==="ebook" && pdfFile){
    reader.onload = e=>{
      tema.pdf = e.target.result;
      salvarFinal();
    };
    reader.readAsDataURL(pdfFile);
    return;
  }

  tema.texto = texto.value;
  salvarFinal();
}

/* FINAL */
function salvarFinal(){
  db.ref("temas").set(temas);
  alert("Conteúdo salvo com sucesso!");
}

</script>

</body>
</html>
