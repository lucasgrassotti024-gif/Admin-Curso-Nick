<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Conteúdo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #0b1d3a, #1d3557, #2a6f97, #e9c46a);
  color: white;
}

.header {
  padding: 80px 60px 30px;
}

.header h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 2.5rem;
}

.voltar {
  display: inline-block;
  margin-bottom: 30px;
  padding: 10px 22px;
  border-radius: 30px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.5);
  color: white;
  text-decoration: none;
}

.main {
  padding: 40px 60px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.icon {
  font-size: 40px;
  margin-bottom: 15px;
}

.form {
  margin-top: 40px;
  display: none;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

.footer {
  text-align: center;
  padding: 30px;
  color: rgba(255,255,255,0.6);
}

@media (max-width: 700px) {
  .header, .main {
    padding: 20px;
  }
}
</style>
</head>

<body>

<div class="header">
  <a href="#" onclick="voltar(event)" class="voltar">← Voltar</a>
  <h1 id="titulo">Editar Conteúdo</h1>
</div>

<div class="main">

  <div class="grid">

    <div class="card" onclick="abrirForm('apresentacao')">
      <div class="icon">📊</div>
      <h2>Apresentação</h2>
      <p>Adicionar imagem</p>
    </div>

    <div class="card" onclick="abrirForm('video')">
      <div class="icon">🎥</div>
      <h2>Videoaula</h2>
      <p>Adicionar vídeo</p>
    </div>

    <div class="card" onclick="abrirForm('ebook')">
      <div class="icon">📘</div>
      <h2>E-book</h2>
      <p>Adicionar PDF ou texto</p>
    </div>

  </div>

  <!-- FORM -->
  <div class="form" id="form">

    <input type="file" id="fileVideo" accept="video/*">
    <input type="file" id="fileImagem" accept="image/*">
    <input type="file" id="filePdf" accept=".pdf">

    <textarea id="texto" placeholder="Texto do e-book"></textarea>

    <button onclick="salvar()">Salvar Conteúdo</button>

  </div>

</div>

<div class="footer">
  © 2026 — Nicholas Grassotti Spolavori
</div>

<script>

function voltar(e){
  e.preventDefault(); // impede o comportamento do href
  window.location.href = "admin_index.html";
}

let temas = JSON.parse(localStorage.getItem("temas")) || [];
const id = localStorage.getItem("editando");
const tema = temas.find(t => t.id == id);

let tipoAtual = "";

function abrirForm(tipo) {
  tipoAtual = tipo;
  document.getElementById("form").style.display = "block";

  fileVideo.style.display = "none";
  fileImagem.style.display = "none";
  filePdf.style.display = "none";
  texto.style.display = "none";

  if (tipo === "video") {
    fileVideo.style.display = "block";
  }

  if (tipo === "apresentacao") {
    fileImagem.style.display = "block";
  }

  if (tipo === "ebook") {
    filePdf.style.display = "block";
    texto.style.display = "block";
  }
}

function salvar() {
  if (!tema) return;

  const fileVideo = fileVideoInput();
  const fileImagem = fileImagemInput();
  const filePdf = filePdfInput();

  const reader = new FileReader();

  if (tipoAtual === "video" && fileVideo) {
    reader.onload = e => {
      tema.video = e.target.result;
      salvarFinal();
    };
    reader.readAsDataURL(fileVideo);
    return;
  }

  if (tipoAtual === "apresentacao" && fileImagem) {
    reader.onload = e => {
      tema.imagem = e.target.result;
      salvarFinal();
    };
    reader.readAsDataURL(fileImagem);
    return;
  }

  if (tipoAtual === "ebook" && filePdf) {
    reader.onload = e => {
      tema.pdf = e.target.result;
      salvarFinal();
    };
    reader.readAsDataURL(filePdf);
    return;
  }

  tema.texto = texto.value;
  salvarFinal();
}

function fileVideoInput(){
  return document.getElementById("fileVideo").files[0];
}

function fileImagemInput(){
  return document.getElementById("fileImagem").files[0];
}

function filePdfInput(){
  return document.getElementById("filePdf").files[0];
}

function salvarFinal() {
  db.ref("temas").set(temas);
  alert("Conteúdo salvo com sucesso!");
}

</script>

</body>
</html>
